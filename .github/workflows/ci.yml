name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: app/requirements-ci.txt
      - name: Install pinned environment
        run: pip install -r app/requirements-ci.txt
      - name: Test suite (environment + toe validation + fast reproduction + web build)
        run: python -m pytest app/tests -q
        env:
          MPLBACKEND: Agg
          PYTHONHASHSEED: "0"
          OMP_NUM_THREADS: "4"
