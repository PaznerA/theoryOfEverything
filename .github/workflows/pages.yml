name: Deploy GitHub Pages

# The site is a VIEW of the repo (web/build.py renders markdown + JSON
# registries). NOTE: deploying makes the site public — paper pages carry the
# internal-draft banner, but the publish decision belongs to the human owner.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install site-builder deps
        run: pip install "markdown>=3.8" "jinja2>=3.1"
      - name: Build site from repo structure
        run: python web/build.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
